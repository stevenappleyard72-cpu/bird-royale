<!DOCTYPE html>
<html>
<head>
  <title>Bird Royale</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #87ceeb;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
    }

    #gameArea {
      width: 400px;
      height: 500px;
      background: white;
      border: 4px solid black;
      margin: 20px auto;
      position: relative;
      overflow: hidden;
    }

    #bird {
      width: 40px;
      height: 40px;
      background: gold;
      border-radius: 50%;
      position: absolute;
      left: 80px;
      top: 220px;
    }

    button {
      font-size: 20px;
      padding: 10px 20px;
    }

    #message {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Bird Royale v0.2</h1>

  <div id="gameArea">
    <div id="bird"></div>
  </div>

  <button onclick="startGame()">Start Game</button>
  <p id="message"></p>

  <script>
    function startGame() {
      document.getElementById("message").textContent =
        "Bird Royale has started!";
    }
  </script>
</body>
</html>
