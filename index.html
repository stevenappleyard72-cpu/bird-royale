<!DOCTYPE html>
<html>
<head>
  <title>Bird Royale</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Bird Royale</h1>

  <div class="panel" id="lobby">
    <h2>Lobby</h2>

    <input id="playerName" placeholder="Your name" />
<input id="gameSpeedInput"
       type="number"
       min="1"
       max="99"
       value="10">
  <p>
Game Speed:
1 = 0.1x,
10 = 1.0x,
20 = 2.0x,
99 = 9.9x
</p>
    <br />

    <button onclick="createGame()">Create Game</button>

    <hr />

    <input id="gameCodeInput" placeholder="Game code" />
    <br />
    <button onclick="joinGame()">Join Game</button>

    <p id="message"></p>
    <div id="playerList"></div>
  </div>

<div id="gameArea">
    <div id="playersContainer"></div>
    <div id="obstacleContainer"></div>
    <div id="countdown"></div>
</div>

  <div id="controls">
    <div class="control-row">
      <button class="control-button" onclick="handleMove('left')">↖</button>
      <button class="control-button" onclick="handleMove('up')">↑</button>
      <button class="control-button" onclick="handleMove('right')">↗</button>
    </div>

    <div class="control-row">
      <button class="control-button" onclick="handleMove('down')">↓</button>
    </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
