<!DOCTYPE html>

<html>

<head>

  <title>Bird Royale</title>

  <style>

    body {

      margin: 0;

      font-family: Arial, sans-serif;

      background: #87ceeb;

      text-align: center;

    }

    h1 {

      margin-top: 30px;

    }

    .panel {

      background: white;

      width: 420px;

      margin: 20px auto;

      padding: 20px;

      border: 4px solid black;

      border-radius: 10px;

    }

    input {

      font-size: 18px;

      padding: 8px;

      margin: 8px;

      width: 250px;

    }

    button {

      font-size: 18px;

      padding: 10px 18px;

      margin: 8px;

      cursor: pointer;

    }

    #gameArea {

      width: 420px;

      height: 500px;

      background: white;

      border: 4px solid black;

      margin: 20px auto;

      position: relative;

      overflow: hidden;

      display: none;

    }

    .bird {

      width: 40px;

      height: 40px;

      background: gold;

      border-radius: 50%;

      position: absolute;

      left: 80px;

      top: 220px;

    }

    #countdown {

      position: absolute;

      width: 100%;

      top: 190px;

      font-size: 72px;

      font-weight: bold;

      color: black;

      display: none;

    }

    #message {

      font-weight: bold;

      font-size: 18px;

    }

  </style>

</head>

<body>

  <h1>Bird Royale</h1>

  <div class="panel" id="lobby">

    <h2>Lobby</h2>

    <input id="playerName" placeholder="Your name" />

    <br />

    <button onclick="createGame()">Create Game</button>

    <hr />

    <input id="gameCodeInput" placeholder="Game code" />

    <br />

    <button onclick="joinGame()">Join Game</button>

    <p id="message"></p>

  </div>

  <div id="gameArea">

    <div class="bird"></div>

    <div id="countdown"></div>

  </div>

  <script>

    let currentGameCode = "";

    let birdX = 80;

    let birdY = 220;

    let velocityY = 0;

    let velocityX = 0;

    const gravity = 0.45;

    const flapStrength = -7.8;

    const sideFlapStrength = -6.4;

    const horizontalPush = 4.8;

    const horizontalDrag = 0.92;

    const diveAmount = 38;

    const diveRecoveryDelay = 120;

    let gameRunning = false;

    let countdownRunning = false;

    function generateGameCode() {

      const letters = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

      let code = "";

      for (let i = 0; i < 4; i++) {

        code += letters[Math.floor(Math.random() * letters.length)];

      }

      return code;

    }

    function getPlayerName() {

      const name = document.getElementById("playerName").value.trim();

      return name === "" ? "Player" : name;

    }

    function createGame() {

      const playerName = getPlayerName();

      currentGameCode = generateGameCode();

      document.getElementById("message").textContent =

        playerName + " created game code: " + currentGameCode;

      prepareGame();

    }

    function joinGame() {

      const playerName = getPlayerName();

      const code = document.getElementById("gameCodeInput").value.trim().toUpperCase();

      if (code === "") {

        document.getElementById("message").textContent = "Please enter a game code.";

        return;

      }

      currentGameCode = code;

      document.getElementById("message").textContent =

        playerName + " joined game: " + currentGameCode;

      prepareGame();

    }

    function prepareGame() {

      document.getElementById("gameArea").style.display = "block";

      birdX = 80;

      birdY = 220;

      velocityX = 0;

      velocityY = 0;

      drawBird();

      startCountdown();

    }

    function startCountdown() {

      const countdown = document.getElementById("countdown");

      countdownRunning = true;

      gameRunning = false;

      let number = 3;

      countdown.style.display = "block";

      countdown.textContent = number;

      const timer = setInterval(function() {

        number--;

        if (number > 0) {

          countdown.textContent = number;

        } else if (number === 0) {

          countdown.textContent = "GO!";

        } else {

          clearInterval(timer);

          countdown.style.display = "none";

          countdownRunning = false;

          startGame();

        }

      }, 1000);

    }

    function startGame() {

      gameRunning = true;

      gameLoop();

    }

    function gameLoop() {

      if (!gameRunning) {

        return;

      }

      velocityY += gravity;

      birdY += velocityY;

      birdX += velocityX;

      velocityX *= horizontalDrag;

      keepBirdInsideArena();

      drawBird();

      if (birdY <= 0 || birdY >= 460) {

        gameRunning = false;

        document.getElementById("message").textContent = "Game over!";

        return;

      }

      requestAnimationFrame(gameLoop);

    }

    function drawBird() {

      const bird = document.querySelector(".bird");

      bird.style.left = birdX + "px";

      bird.style.top = birdY + "px";

    }

    function keepBirdInsideArena() {

      if (birdX < 0) {

        birdX = 0;

        velocityX = 0;

      }

      if (birdX > 380) {

        birdX = 380;

        velocityX = 0;

      }

      if (birdY < 0) {

        birdY = 0;

      }

      if (birdY > 460) {

        birdY = 460;

      }

    }

    function flapUp() {

      velocityY = flapStrength;

    }

    function flapLeft() {

      velocityY = sideFlapStrength;

      velocityX -= horizontalPush;

    }

    function flapRight() {

      velocityY = sideFlapStrength;

      velocityX += horizontalPush;

    }

    function diveThenRecover() {

      birdY += diveAmount;

      velocityY = 2;

      setTimeout(function() {

        if (gameRunning) {

          velocityY = flapStrength;

        }

      }, diveRecoveryDelay);

    }

    document.addEventListener("keydown", function(event) {

      const movementKeys = [

        "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight",

        "KeyW", "KeyA", "KeyS", "KeyD", "Space"

      ];

      if (movementKeys.includes(event.code)) {

        event.preventDefault();

      }

      if (!gameRunning || countdownRunning) {

        return;

      }

      if (event.code === "ArrowUp" || event.code === "KeyW" || event.code === "Space") {

        flapUp();

      }

      if (event.code === "ArrowLeft" || event.code === "KeyA") {

        flapLeft();

      }

      if (event.code === "ArrowRight" || event.code === "KeyD") {

        flapRight();

      }

      if (event.code === "ArrowDown" || event.code === "KeyS") {

        diveThenRecover();

      }

    });

    document.addEventListener("click", function() {

      if (gameRunning && !countdownRunning) {

        flapUp();

      }

    });

  </script>

</body>

</html>
