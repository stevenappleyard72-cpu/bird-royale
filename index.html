<!DOCTYPE html>
<html>
  <head>
    <title>Bird Royale</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <h1>Bird Royale <span id="version"></span></h1>

    <div class="panel" id="lobby">
      <h2>Lobby</h2>

      <input id="playerName" placeholder="Your name" />
      <br />
      <input id="gameSpeedInput" type="number" min="1" max="99" value="3" placeholder="Game speed 1-99" />
      <p>Speed: 1 = 0.1x, 10 = 1.0x, 99 = 9.9x</p>
      <br />

      <input id="targetScoreInput" type="number" min="2" max="5" value="3" placeholder="Target score 2-5" />
      <br />
      <p>Target score: first to 2-5 round wins</p>

      <button onclick="createGame()">Create Game</button>

      <hr />

      <input id="gameCodeInput" placeholder="Game code" />
      <br />
      <button onclick="joinGame()">Join Game</button>

      <hr />

      <button id="quickJoinBtn" onclick="quickJoin()">Quick Join a Running Game</button>

      <p id="message"></p>
      <div id="playerList"></div>
    </div>

    <div id="gameArea">
      <div id="vineStrip"></div>
      <div id="scoreHud"></div>
      <div id="playersContainer"></div>
      <div id="obstacleContainer"></div>
      <div id="countdown"></div>
      <div id="grassStrip"></div>
    </div>

    <div id="muteBar">
      <button id="muteBtn" onclick="toggleMute()">🔊 Sound</button>
    </div>

    <div id="controls">
      <div class="control-row">
        <button class="control-button control-left" onclick="handleMove('left')">↖</button>
        <div class="control-middle">
          <button class="control-button control-up" onclick="handleMove('up')">↑</button>
          <button class="control-button control-down" onclick="handleMove('down')">↓</button>
        </div>
        <button class="control-button control-right" onclick="handleMove('right')">↗</button>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="sounds.js"></script>
    <script src="game.js"></script>

    <div id="leaderboardPanel">
      <div class="lb-half">
        <div class="lb-section-title">
          This Hour
          <span id="lbCountdown" class="lb-countdown"></span>
        </div>
        <table class="lb-table">
          <thead><tr><th>#</th><th>Player</th><th>M&nbsp;/&nbsp;R</th></tr></thead>
          <tbody id="hourlyTableBody">
            <tr><td colspan="3" class="lb-empty">No games yet this hour</td></tr>
          </tbody>
        </table>
        <div class="lb-hint">M = match wins &nbsp;·&nbsp; R = round wins</div>
      </div>
      <div class="lb-half">
        <div class="lb-section-title">Hall of Fame ✨</div>
        <table class="lb-table">
          <thead><tr><th>#</th><th>Player</th><th>⭐</th></tr></thead>
          <tbody id="hofTableBody">
            <tr><td colspan="3" class="lb-empty">No champions yet</td></tr>
          </tbody>
        </table>
        <div class="lb-hint">⭐ earned by topping each hourly board</div>
      </div>
    </div>
  </body>
</html>
