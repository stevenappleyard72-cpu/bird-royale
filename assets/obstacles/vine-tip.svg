<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 38">
  <!-- Stone base at top -->
  <rect width="40" height="6" fill="#505050" stroke="#333" stroke-width="0.5"/>
  <!-- Hanging vine stems of varied length -->
  <path d="M4,0  C5,7  3,14 5,22  C4,30 5,35" stroke="#3A6B30" stroke-width="2.2" fill="none"/>
  <path d="M11,0 C10,8 12,17 10,25 C11,32 10,38" stroke="#4A7C3F" stroke-width="2.5" fill="none"/>
  <path d="M19,0 C20,7 18,15 20,23 C19,31 21,36" stroke="#3A6B30" stroke-width="2.2" fill="none"/>
  <path d="M27,0 C26,6 28,14 26,22 C27,30 25,36" stroke="#4A7C3F" stroke-width="2.5" fill="none"/>
  <path d="M36,0 C37,8 35,16 37,24 C36,30 37,33" stroke="#3A6B30" stroke-width="2"   fill="none"/>
  <!-- Mid-vine leaves -->
  <ellipse cx="5"  cy="16" rx="5"   ry="3"   fill="#32CD32" stroke="#111" stroke-width="0.8" transform="rotate(25 5 16)"/>
  <ellipse cx="3"  cy="28" rx="4.5" ry="2.8" fill="#2AAF2A" stroke="#111" stroke-width="0.8" transform="rotate(-20 3 28)"/>
  <ellipse cx="13" cy="20" rx="5"   ry="3"   fill="#32CD32" stroke="#111" stroke-width="0.8" transform="rotate(-30 13 20)"/>
  <ellipse cx="20" cy="14" rx="4.5" ry="2.8" fill="#2AAF2A" stroke="#111" stroke-width="0.8" transform="rotate(20 20 14)"/>
  <ellipse cx="27" cy="18" rx="5"   ry="3"   fill="#32CD32" stroke="#111" stroke-width="0.8" transform="rotate(-15 27 18)"/>
  <ellipse cx="37" cy="22" rx="4"   ry="2.5" fill="#2AAF2A" stroke="#111" stroke-width="0.8" transform="rotate(30 37 22)"/>
  <!-- Terminal leaf clusters at vine ends -->
  <circle cx="5"  cy="36" r="4.5" fill="#1A7A1A" stroke="#111" stroke-width="0.9"/>
  <circle cx="11" cy="37" r="5"   fill="#228B22" stroke="#111" stroke-width="0.9"/>
  <circle cx="20" cy="36" r="4.5" fill="#1A7A1A" stroke="#111" stroke-width="0.9"/>
  <circle cx="26" cy="36" r="5"   fill="#228B22" stroke="#111" stroke-width="0.9"/>
  <circle cx="37" cy="34" r="4"   fill="#1A7A1A" stroke="#111" stroke-width="0.9"/>
</svg>
