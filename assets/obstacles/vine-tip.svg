  <path d="M29,0 C28,11 30,23 28,36 C29,43 27,51" stroke="#4A7C3F" stroke-width="2.5" fill="none"/>
  <path d="M37,0 C38,10 36,21 38,32 C39,41 37,47" stroke="#3A6B30" stroke-width="2"   fill="none"/>

  <!-- Layer 1 (top) -->
  <circle cx="4"  cy="6"  r="8.5" fill="#32CD32" stroke="#1A6B1A" stroke-width="1"/>
  <circle cx="15" cy="5"  r="9"   fill="#2AAF2A" stroke="#1A6B1A" stroke-width="1"/>
  <circle cx="25" cy="6"  r="8.5" fill="#228B22" stroke="#1A6B1A" stroke-width="1"/>
  <circle cx="35" cy="5"  r="8"   fill="#32CD32" stroke="#1A6B1A" stroke-width="1"/>

  <!-- Layer 2 -->
  <circle cx="1"  cy="17" r="7"   fill="#228B22" stroke="#1A6B1A" stroke-width="1"/>
  <circle cx="9"  cy="17" r="9.5" fill="#2AAF2A" stroke="#1A6B1A" stroke-width="1"/>
  <circle cx="21" cy="16" r="10"  fill="#32CD32" stroke="#1A6B1A" stroke-width="1"/>
  <circle cx="32" cy="17" r="9"   fill="#228B22" stroke="#1A6B1A" stroke-width="1"/>
  <circle cx="40" cy="17" r="7"   fill="#32CD32" stroke="#1A6B1A" stroke-width="1"/>

  <!-- Layer 3 -->
  <circle cx="5"  cy="29" r="9.5" fill="#32CD32" stroke="#1A6B1A" stroke-width="1"/>
  <circle cx="17" cy="28" r="10"  fill="#2AAF2A" stroke="#1A6B1A" stroke-width="1"/>
