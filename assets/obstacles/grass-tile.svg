  <path d="M22,9 C21,4 22,0  23,-1 C23,3 24,9" fill="#228B22" stroke="#1A6B1A" stroke-width="0.5"/>
  <path d="M27,9 C26,3 28,-1 29,1 C28,5 29,9" fill="#2DB82D" stroke="#1A6B1A" stroke-width="0.5"/>
  <path d="M33,9 C32,3 34,0  35,2 C34,5 35,9" fill="#228B22" stroke="#1A6B1A" stroke-width="0.5"/>
  <path d="M38,9 C37,4 38,0  39,-1 C39,3 40,9" fill="#32CD32" stroke="#1A6B1A" stroke-width="0.5"/>
  <!-- Pebbles/texture in soil -->
