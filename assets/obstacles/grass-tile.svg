<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 28">
  <!-- Transparent background - grass only -->

  <!-- Back layer: wide rounded clumps for depth -->
  <ellipse cx="5"  cy="26" rx="7"  ry="6" fill="#1A7A1A"/>
  <ellipse cx="16" cy="27" rx="8"  ry="7" fill="#1A7A1A"/>
  <ellipse cx="27" cy="26" rx="7"  ry="6" fill="#1A7A1A"/>
  <ellipse cx="38" cy="27" rx="7"  ry="6" fill="#1A7A1A"/>

  <!-- Mid layer: lighter clumps -->
  <ellipse cx="0"  cy="24" rx="6"  ry="5.5" fill="#228B22"/>
  <ellipse cx="11" cy="23" rx="7.5" ry="6.5" fill="#228B22"/>
  <ellipse cx="22" cy="24" rx="7"  ry="6"   fill="#228B22"/>
  <ellipse cx="33" cy="23" rx="7.5" ry="6.5" fill="#228B22"/>
  <ellipse cx="40" cy="24" rx="5"  ry="5"   fill="#228B22"/>

  <!-- Front layer: brightest clumps -->
  <ellipse cx="5"  cy="21" rx="6.5" ry="6" fill="#2DB82D"/>
  <ellipse cx="17" cy="20" rx="8"   ry="7" fill="#32CD32"/>
  <ellipse cx="28" cy="21" rx="7.5" ry="6.5" fill="#2DB82D"/>
  <ellipse cx="39" cy="20" rx="6"   ry="6" fill="#32CD32"/>

  <!-- Individual blade layer: tall pointed blades poking above clumps -->
  <path d="M2,20  C1,13 2,7  3,3   C4,7  4,14 4,20"  fill="#32CD32" stroke="#1A6B1A" stroke-width="0.4"/>
  <path d="M7,19  C6,11 8,5  9,1   C10,5 9,12 10,19" fill="#39D939" stroke="#1A6B1A" stroke-width="0.4"/>
  <path d="M13,20 C12,12 14,6 15,2  C16,6 15,13 16,20" fill="#32CD32" stroke="#1A6B1A" stroke-width="0.4"/>
  <path d="M19,19 C18,10 20,4 21,0  C22,4 21,11 22,19" fill="#2DB82D" stroke="#1A6B1A" stroke-width="0.4"/>
  <path d="M24,20 C23,12 25,6 26,2  C27,6 26,13 27,20" fill="#32CD32" stroke="#1A6B1A" stroke-width="0.4"/>
  <path d="M30,19 C29,11 31,5 32,1  C33,5 32,12 33,19" fill="#39D939" stroke="#1A6B1A" stroke-width="0.4"/>
  <path d="M35,20 C34,13 36,7 37,3  C38,7 37,14 38,20" fill="#32CD32" stroke="#1A6B1A" stroke-width="0.4"/>
  <path d="M39,19 C38,11 40,5 40,2  C40,6 40,12 40,19" fill="#2DB82D" stroke="#1A6B1A" stroke-width="0.4"/>
</svg>
