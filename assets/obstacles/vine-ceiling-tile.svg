<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 24">
  <!-- Transparent - dense leaf mass, no stone background -->

  <!-- Horizontal vine stem - seamless at x=0/x=40 -->
  <path d="M0,4 C6,2 14,6 20,4 C26,2 34,6 40,4" stroke="#4A7C3F" stroke-width="2.5" fill="none"/>

  <!-- Pendant stems -->
  <path d="M7,3  C7,8  6,15"  stroke="#3A6B30" stroke-width="1.8" fill="none"/>
  <path d="M20,3 C21,9 19,17" stroke="#3A6B30" stroke-width="2"   fill="none"/>
  <path d="M33,3 C34,8 33,16" stroke="#4A7C3F" stroke-width="1.8" fill="none"/>

  <!-- Upper leaf row -->
  <circle cx="3"  cy="4"  r="7.5" fill="#32CD32" stroke="#1A6B1A" stroke-width="0.9"/>
  <circle cx="13" cy="3"  r="8"   fill="#2AAF2A" stroke="#1A6B1A" stroke-width="0.9"/>
  <circle cx="23" cy="4"  r="7.5" fill="#228B22" stroke="#1A6B1A" stroke-width="0.9"/>
  <circle cx="33" cy="3"  r="8"   fill="#32CD32" stroke="#1A6B1A" stroke-width="0.9"/>
  <circle cx="40" cy="4"  r="6"   fill="#2AAF2A" stroke="#1A6B1A" stroke-width="0.9"/>

  <!-- Lower hanging leaf row -->
  <circle cx="7"  cy="14" r="7.5" fill="#228B22" stroke="#1A6B1A" stroke-width="0.9"/>
  <circle cx="18" cy="15" r="8"   fill="#32CD32" stroke="#1A6B1A" stroke-width="0.9"/>
  <circle cx="29" cy="14" r="7.5" fill="#2AAF2A" stroke="#1A6B1A" stroke-width="0.9"/>
  <circle cx="39" cy="15" r="6.5" fill="#228B22" stroke="#1A6B1A" stroke-width="0.9"/>

  <!-- Bottom draping clusters -->
  <circle cx="3"  cy="22" r="5.5" fill="#1A7A1A" stroke="#1A6B1A" stroke-width="0.8"/>
  <circle cx="14" cy="23" r="6"   fill="#228B22" stroke="#1A6B1A" stroke-width="0.8"/>
  <circle cx="25" cy="22" r="5.5" fill="#1A7A1A" stroke="#1A6B1A" stroke-width="0.8"/>
  <circle cx="35" cy="23" r="6"   fill="#228B22" stroke="#1A6B1A" stroke-width="0.8"/>
</svg>
