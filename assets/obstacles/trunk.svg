<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Base bark colour -->
  <rect width="40" height="40" fill="#8B4513"/>
  <!-- Left highlight edge -->
  <rect x="0" y="0" width="5" height="40" fill="#A05A28"/>
  <!-- Right shadow edge -->
  <rect x="35" y="0" width="5" height="40" fill="#5C2E08"/>
  <!-- Vertical bark streaks — straight lines tile seamlessly -->
  <line x1="9"  y1="0" x2="9"  y2="40" stroke="#5C2E08" stroke-width="1.5" opacity="0.6"/>
  <line x1="17" y1="0" x2="17" y2="40" stroke="#5C2E08" stroke-width="1"   opacity="0.4"/>
  <line x1="25" y1="0" x2="25" y2="40" stroke="#5C2E08" stroke-width="1.5" opacity="0.5"/>
  <line x1="33" y1="0" x2="33" y2="40" stroke="#5C2E08" stroke-width="1"   opacity="0.4"/>
</svg>
