<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Back shadow clusters -->
  <circle cx="10" cy="34" r="13" fill="#1A7A1A" stroke="#111" stroke-width="1.2"/>
  <circle cx="38" cy="33" r="12" fill="#1A7A1A" stroke="#111" stroke-width="1.2"/>
  <!-- Mid foliage -->
  <circle cx="8"  cy="26" r="13" fill="#2AAF2A" stroke="#111" stroke-width="1.3"/>
  <circle cx="40" cy="25" r="12" fill="#2AAF2A" stroke="#111" stroke-width="1.3"/>
  <!-- Main centre blob -->
  <circle cx="24" cy="19" r="17" fill="#32CD32" stroke="#111" stroke-width="1.5"/>
  <!-- Top highlight -->
  <circle cx="17" cy="13" r="10" fill="#55EE55" stroke="#111" stroke-width="1"/>
  <!-- Fruit / flower dots -->
  <circle cx="28" cy="9"  r="3.2" fill="#FF4040" stroke="#111" stroke-width="0.9"/>
  <circle cx="14" cy="18" r="2.6" fill="#FF6820" stroke="#111" stroke-width="0.8"/>
  <circle cx="34" cy="17" r="2.2" fill="#FFD700" stroke="#111" stroke-width="0.8"/>
  <!-- Trunk stub at base so it blends with trunk body -->
  <rect x="16" y="42" width="16" height="6" fill="#8B4513" stroke="#111" stroke-width="0.8"/>
</svg>
